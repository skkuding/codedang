apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-script
  namespace: sealed-secrets-backup
data:
  backup.sh: |
    #!/bin/sh

    # -e: exit on error
    # -u: error on undefined vars
    # -o pipefail: fail on any pipe error
    set -euo pipefail


    # Step 1: Fetch all sealed-secrets encryption keys from the cluster
    echo "Exporting sealed-secrets keys from kube-system..."
    KEYS=$(kubectl get secrets -n kube-system \
      -l sealedsecrets.bitnami.com/sealed-secrets-key \
      -o json)

    KEY_COUNT=$(echo "$KEYS" | jq '.items | length')
    echo "Found $KEY_COUNT keys"

    if [ "$KEY_COUNT" -eq 0 ]; then
      echo "ERROR: No sealed-secrets keys found"
      exit 1
    fi

    # Step 2: Upload to S3 — latest.json (overwritten; versioning keeps history)
    #         and snapshots/<timestamp>.json (immutable point-in-time copy)
    TIMESTAMP=$(date -u +%Y-%m-%dT%H-%M-%SZ)
    LATEST_URI="s3://${S3_BUCKET}/${S3_KEY_PREFIX}/latest.json"
    SNAPSHOT_URI="s3://${S3_BUCKET}/${S3_KEY_PREFIX}/snapshots/${TIMESTAMP}.json"

    echo "$KEYS" > /tmp/keys.json

    echo "Uploading latest: $LATEST_URI"
    aws s3 cp /tmp/keys.json "$LATEST_URI" --region ap-northeast-2 --no-progress

    echo "Uploading snapshot: $SNAPSHOT_URI"
    aws s3 cp /tmp/keys.json "$SNAPSHOT_URI" --region ap-northeast-2 --no-progress

    # Step 3: Verify by re-downloading latest and comparing key counts
    echo "Verifying backup integrity..."
    REMOTE_COUNT=$(aws s3 cp "$LATEST_URI" - --region ap-northeast-2 --no-progress | jq '.items | length')

    if [ "$KEY_COUNT" != "$REMOTE_COUNT" ]; then
      echo "ERROR: Integrity check failed (local=$KEY_COUNT, remote=$REMOTE_COUNT)"
      exit 1
    fi

    echo "Backup complete: $REMOTE_COUNT keys saved to $LATEST_URI"
