daemonset:
  enabled: true

service:
  enabled: true # required for ServiceMonitor

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Mount host journal directory + machine-id so promtail can scrape systemd-journald.
# /etc/machine-id is required because journald stores logs under
# /var/log/journal/<machine-id>/ and the reader uses the in-process machine-id
# to pick the directory; without the host file mounted, the container's own
# machine-id is used and zero logs are ingested.
extraVolumes:
  - name: journal
    hostPath:
      path: /var/log/journal
  - name: machine-id
    hostPath:
      path: /etc/machine-id

extraVolumeMounts:
  - name: journal
    mountPath: /var/log/journal
    readOnly: true
  - name: machine-id
    mountPath: /etc/machine-id
    readOnly: true

# enable Promtail ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: true
  namespaceSelector:
    matchNames:
      - monitoring-promtail
  labels:
    release: prometheus # release name of kube-prometheus-stack

config:
  enabled: true # enable Promtail config from Helm chart
  logLevel: info
  logFormat: json
  serverPort: 3101
  clients:
    - url: http://loki.monitoring-loki.svc.cluster.local:3100/loki/api/v1/push
  snippets:
    # Three separate journal jobs because promtail's matches parser only accepts
    # FIELD=VALUE tokens (no '+' disjunction) AND sd-journal AND-combines matches
    # across different fields. To OR across fields (units OR kernel OR sudo) we
    # need a job per field. All jobs share `labels.job: systemd-journal` so a
    # single LogQL selector `{job="systemd-journal"}` still works.
    #
    # ceiling for catch-up after positions cursor is lost (e.g. node reboot —
    # positions live on tmpfs /run/promtail/). 24h covers a weekday outage +
    # next-morning recovery while keeping startup catch-up bounded.
    extraScrapeConfigs: |
      - job_name: systemd-journal-units
        journal:
          path: /var/log/journal
          max_age: 24h
          labels:
            job: systemd-journal
          matches: "_SYSTEMD_UNIT=k3s.service _SYSTEMD_UNIT=k3s-agent.service _SYSTEMD_UNIT=containerd.service _SYSTEMD_UNIT=sshd.service _SYSTEMD_UNIT=systemd-logind.service"
        relabel_configs:
          - source_labels: ['__journal__systemd_unit']
            target_label: unit
          - source_labels: ['__journal__hostname']
            target_label: hostname
          - source_labels: ['__journal__transport']
            target_label: transport
          - source_labels: ['__journal_priority_keyword']
            target_label: level

      - job_name: systemd-journal-kernel
        journal:
          path: /var/log/journal
          max_age: 24h
          labels:
            job: systemd-journal
          matches: "_TRANSPORT=kernel"
        relabel_configs:
          - source_labels: ['__journal__hostname']
            target_label: hostname
          - source_labels: ['__journal__transport']
            target_label: transport
          - source_labels: ['__journal_priority_keyword']
            target_label: level

      - job_name: systemd-journal-sudo
        journal:
          path: /var/log/journal
          max_age: 24h
          labels:
            job: systemd-journal
          matches: "_COMM=sudo"
        relabel_configs:
          - source_labels: ['__journal__hostname']
            target_label: hostname
          - source_labels: ['__journal__comm']
            target_label: comm
          - source_labels: ['__journal_priority_keyword']
            target_label: level
