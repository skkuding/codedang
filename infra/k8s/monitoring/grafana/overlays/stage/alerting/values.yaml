alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: discord
        receivers:
          - uid: discord-default
            type: discord
            settings:
              url: $__env{DISCORD_WEBHOOK_URL}

  notification-policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: discord
        group_by: ['grafana_folder', 'alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

  # stage 환경은 AWS RDS를 사용하지 않으므로 AWS alert rules 없음
  rules.yaml:
    apiVersion: 1
    groups:
      - orgId: 1
        name: K8s Node
        folder: Infra Alerts
        interval: 5m
        rules:
          - uid: node-high-memory-usage
            title: High Node Memory Usage
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
                  intervalMs: 60000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 85
                        type: gt
                      operator:
                        type: and
                      reducer:
                        type: last
                  type: classic_condition
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: 'Node memory usage > 85%'
              description: '노드 메모리 사용률이 85%를 초과했습니다.'

          - uid: node-high-disk-usage
            title: High Node Disk Usage
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) * 100
                  intervalMs: 60000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 85
                        type: gt
                      operator:
                        type: and
                      reducer:
                        type: last
                  type: classic_condition
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: 'Node disk usage > 85%'
              description: '노드 디스크 사용률이 85%를 초과했습니다.'

          - uid: node-not-ready
            title: Node Not Ready
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: kube_node_status_condition{condition="Ready",status="true"} == 0
                  intervalMs: 60000
                  maxDataPoints: 43200
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      reducer:
                        type: last
                  type: classic_condition
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: 'Node not ready'
              description: '노드가 Ready 상태가 아닙니다.'
