alerting:
  # stage 환경은 AWS RDS를 사용하지 않으므로 AWS alert rules 없음
  rules.yaml:
    apiVersion: 1
    groups:
      - orgId: 1
        name: K8s Node
        folder: Infra Alerts
        interval: 5m
        rules:
          - uid: node-high-memory-usage
            title: 노드 메모리 사용률 높음
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
                  intervalMs: 60000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        params:
                          - 85
                        type: gt
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: '노드 {{ `{{ $labels.instance }}` }} 메모리 사용률 높음'
              description: |
                노드: {{ `{{ $labels.instance }}` }}
                사용률: {{ `{{ printf "%.1f" $values.B.Value }}` }}% (임계 85%, 5분 지속)
                조치: kubectl top pod -A로 메모리 점유 큰 pod 확인

          - uid: node-high-disk-usage
            title: 노드 디스크 사용률 높음
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) * 100
                  intervalMs: 60000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        params:
                          - 85
                        type: gt
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: '노드 {{ `{{ $labels.instance }}` }} 디스크 사용률 높음'
              description: |
                노드: {{ `{{ $labels.instance }}` }}
                사용률: {{ `{{ printf "%.1f" $values.B.Value }}` }}% (임계 85%, 5분 지속)
                조치: SSH 접속 후 df -h로 점유 큰 경로 확인 및 정리

          - uid: node-not-ready
            title: 노드 다운
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: kube_node_status_condition{condition="Ready",status="true"}
                  intervalMs: 60000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        params:
                          - 1
                        type: lt
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: '노드 {{ `{{ $labels.node }}` }} Ready 상태 아님'
              description: |
                노드: {{ `{{ $labels.node }}` }}
                상태: NotReady (2분+ 지속)
                조치:
                  1. SSH 접속 시도
                  2. systemctl status k3s-agent
                  3. df -h, free -h로 리소스 확인

      - orgId: 1
        name: RabbitMQ
        folder: Infra Alerts
        interval: 5m
        rules:
          - uid: rabbitmq-ready-messages-high
            title: RabbitMQ 메시지 적체
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: rabbitmq_queue_messages_ready
                  intervalMs: 60000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        params:
                          - 100
                        type: gt
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: '큐 {{ `{{ $labels.queue }}` }} Ready 메시지 적체'
              description: |
                큐: {{ `{{ $labels.queue }}` }}
                Ready 메시지: {{ `{{ $values.B.Value }}` }}개 (임계 100, 5분 지속)
                의미: Consumer가 메시지 처리를 못 따라가고 있음
                조치: Iris/Plag pod 상태 및 로그 확인

          - uid: rabbitmq-unacked-messages-high
            title: RabbitMQ 미확인 메시지 적체
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: rabbitmq_queue_messages_unacked
                  intervalMs: 60000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        params:
                          - 50
                        type: gt
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: '큐 {{ `{{ $labels.queue }}` }} 미확인 메시지 적체'
              description: |
                큐: {{ `{{ $labels.queue }}` }}
                미확인 메시지: {{ `{{ $values.B.Value }}` }}개 (임계 50, 5분 지속)
                의미: Consumer가 받았지만 ack 못 보냄 (처리 실패/hang 의심)
                조치: Consumer pod 로그 및 재시작 검토
