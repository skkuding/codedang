---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: discord-webhook
  namespace: monitoring-grafana
spec:
  encryptedData:
    # 환경 분리: prod 알림은 신규 Discord 채널로. stage 는 기존 채널 유지.
    # (기존 채널은 스팸성 누적으로 알림 무시되어 prod 신호 묻힘 방지)
    DISCORD_WEBHOOK_URL: 
  template:
    metadata:
      name: discord-webhook
      namespace: monitoring-grafana
      annotations:
        # 같은 webhook을 alertmanager(monitoring-prometheus)에서도 사용 — reflector로 자동 복제
        reflector.v1.k8s.emberstack.com/reflection-allowed: 'true'
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: monitoring-prometheus
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: 'true'
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: monitoring-prometheus
